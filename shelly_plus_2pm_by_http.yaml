zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: 9702754414644deba5cb4ed3e9f33594
      name: Templates/IoT
  templates:
    - uuid: 82c1a6af3ae04b46a3f2fd87132816a7
      template: 'Shelly Plus 2PM by HTTP'
      name: 'Shelly Plus 2PM by HTTP'
      description: |
        Shelly Plus 2PM (SNSW-102P16EU) — two metered switch channels,
        monitored over the local HTTP RPC API. Links "Shelly Gen2 Gen3 common by
        HTTP"; adds switch:0 and switch:1 (output + power metering + temperature).

        PROFILE NOTE: this template covers the SWITCH profile (switch:0/switch:1).
        If the device is set to the COVER (roller) profile it instead reports
        cover:0 — those items are NOT in this template; a cover-profile template
        would parse $["cover:0"].{state,apower,current_pos,...}. Only one profile
        is active at a time.

        Import the common base FIRST. Set {$SHELLY.HTTP.HOST} on the host.
      templates:
        - name: 'Shelly Gen2 Gen3 common by HTTP'
      groups:
        - name: Templates/IoT
      macros:
        - macro: '{$SHELLY.MODEL}'
          value: 'SNSW-102P16EU'
          description: 'Device model/SKU, fed to host inventory Model.'
        - macro: '{$SHELLY.POWER.MAX}'
          value: '2500'
          description: 'High active-power warning threshold per channel, watts.'
      items:
        - uuid: e6694ce40dda4d639eea599e654e7c56
          name: 'Switch 0: Output'
          type: DEPENDENT
          key: 'shelly.switch.output[0]'
          value_type: UNSIGNED
          master_item:
            key: 'shelly.http.status'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$["switch:0"].output'
            - type: BOOL_TO_DECIMAL
              parameters:
                - ''
          valuemap:
            name: 'Shelly boolean'
          tags:
            - tag: component
              value: switch
            - tag: channel
              value: '0'
        - uuid: c19ee66d63454a11bd27830325953b4b
          name: 'Switch 0: Active power'
          type: DEPENDENT
          key: 'shelly.switch.apower[0]'
          value_type: FLOAT
          units: W
          master_item:
            key: 'shelly.http.status'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$["switch:0"].apower'
          tags:
            - tag: component
              value: power
            - tag: channel
              value: '0'
        - uuid: 0e228ff211fc4049b2ede6b9e477e3d0
          name: 'Switch 0: Voltage'
          type: DEPENDENT
          key: 'shelly.switch.voltage[0]'
          value_type: FLOAT
          units: V
          master_item:
            key: 'shelly.http.status'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$["switch:0"].voltage'
          tags:
            - tag: component
              value: power
            - tag: channel
              value: '0'
        - uuid: f82b1dc80915437da1cf605af184eaa3
          name: 'Switch 0: Current'
          type: DEPENDENT
          key: 'shelly.switch.current[0]'
          value_type: FLOAT
          units: A
          master_item:
            key: 'shelly.http.status'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$["switch:0"].current'
          tags:
            - tag: component
              value: power
            - tag: channel
              value: '0'
        - uuid: add93af908b449bf8eef23c20e7d4376
          name: 'Switch 0: Energy total'
          type: DEPENDENT
          key: 'shelly.switch.aenergy[0]'
          value_type: FLOAT
          units: Wh
          master_item:
            key: 'shelly.http.status'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$["switch:0"].aenergy.total'
          tags:
            - tag: component
              value: energy
            - tag: channel
              value: '0'
        - uuid: e83f460fa70e4cc28aee8c592186d752
          name: 'Switch 0: Temperature'
          type: DEPENDENT
          key: 'shelly.switch.temperature[0]'
          value_type: FLOAT
          units: °C
          master_item:
            key: 'shelly.http.status'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$["switch:0"].temperature.tC'
          tags:
            - tag: component
              value: temperature
            - tag: channel
              value: '0'
        - uuid: deb4c322dc0c4044aea206a0822ef5a4
          name: 'Switch 1: Output'
          type: DEPENDENT
          key: 'shelly.switch.output[1]'
          value_type: UNSIGNED
          master_item:
            key: 'shelly.http.status'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$["switch:1"].output'
            - type: BOOL_TO_DECIMAL
              parameters:
                - ''
          valuemap:
            name: 'Shelly boolean'
          tags:
            - tag: component
              value: switch
            - tag: channel
              value: '1'
        - uuid: 18122ea1cf7641728e8c3d71bd52dcb1
          name: 'Switch 1: Active power'
          type: DEPENDENT
          key: 'shelly.switch.apower[1]'
          value_type: FLOAT
          units: W
          master_item:
            key: 'shelly.http.status'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$["switch:1"].apower'
          tags:
            - tag: component
              value: power
            - tag: channel
              value: '1'
        - uuid: 9e0229fc9fe6429fa60c97928f0ed0e7
          name: 'Switch 1: Voltage'
          type: DEPENDENT
          key: 'shelly.switch.voltage[1]'
          value_type: FLOAT
          units: V
          master_item:
            key: 'shelly.http.status'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$["switch:1"].voltage'
          tags:
            - tag: component
              value: power
            - tag: channel
              value: '1'
        - uuid: 45be6081e03e44f2882705581d962595
          name: 'Switch 1: Current'
          type: DEPENDENT
          key: 'shelly.switch.current[1]'
          value_type: FLOAT
          units: A
          master_item:
            key: 'shelly.http.status'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$["switch:1"].current'
          tags:
            - tag: component
              value: power
            - tag: channel
              value: '1'
        - uuid: b46f2beb87924b0281394a4125471722
          name: 'Switch 1: Energy total'
          type: DEPENDENT
          key: 'shelly.switch.aenergy[1]'
          value_type: FLOAT
          units: Wh
          master_item:
            key: 'shelly.http.status'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$["switch:1"].aenergy.total'
          tags:
            - tag: component
              value: energy
            - tag: channel
              value: '1'
        - uuid: 2035510a75da46688153fcc8cf3be201
          name: 'Switch 1: Temperature'
          type: DEPENDENT
          key: 'shelly.switch.temperature[1]'
          value_type: FLOAT
          units: °C
          master_item:
            key: 'shelly.http.status'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$["switch:1"].temperature.tC'
          tags:
            - tag: component
              value: temperature
            - tag: channel
              value: '1'
        - uuid: 6dbd4b56d43a40e8a7c156388e1e5937
          name: 'Model'
          type: DEPENDENT
          key: 'shelly.model'
          value_type: CHAR
          inventory_link: MODEL
          master_item:
            key: 'shelly.http.status'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - 'return "{$SHELLY.MODEL}";'
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - '1d'
          tags:
            - tag: component
              value: inventory
      valuemaps:
        - uuid: 1e632234a56443adbea8096b1c9a46f7
          name: 'Shelly boolean'
          mappings:
            - value: '0'
              newvalue: 'No'
            - value: '1'
              newvalue: 'Yes'
  triggers:
    - uuid: 9a6c6d0ef6834262b63414c2eac291e9
      expression: 'last(/Shelly Plus 2PM by HTTP/shelly.switch.apower[0])>{$SHELLY.POWER.MAX}'
      name: 'Shelly 2PM: High power on channel 0 (>{$SHELLY.POWER.MAX} W)'
      priority: WARNING
      description: 'Active power on switch:0 exceeded the threshold.'
    - uuid: 70c3d6aeffa942e0b72589202ea8ee1e
      expression: 'last(/Shelly Plus 2PM by HTTP/shelly.switch.apower[1])>{$SHELLY.POWER.MAX}'
      name: 'Shelly 2PM: High power on channel 1 (>{$SHELLY.POWER.MAX} W)'
      priority: WARNING
      description: 'Active power on switch:1 exceeded the threshold.'
